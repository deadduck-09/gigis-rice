include ./mocha.conf

font_family      Monocraft Nerd Font
font_size        13
bold_font        auto
italic_font      auto
bold_italic_font auto

mouse_hide_wait  2.0

cursor_shape     block
cursor_trail     10
cursor_trail_start_threshold 0
cursor_trail_decay 0.00 0.08
cursor_blink true

url_style        dotted
adjust_line_height 120%

background_opacity 0.95

# Disable kitty sounds
enable_audio_bell no
visual_bell_duration 0

# Disable close warning
confirm_os_window_close 0

# BEGIN_KITTY_THEME
# Noctalia
include current-theme.conf
# END_KITTY_THEME
